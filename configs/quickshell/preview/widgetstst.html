<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Battery Bar Variants</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #13131d;
    min-height: 100vh;
    padding: 20px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 16px;
    align-items: start;
  }

  .variant {
    background: #1F1F28;
    border-radius: 14px;
    padding: 16px;
    border: 0.5px solid rgba(205,214,244,0.1);
    color: #cdd6f4;
    position: relative;
  }

  .variant::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(135deg, rgba(205,214,244,0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  .label {
    position: absolute;
    top: 6px; right: 10px;
    font-size: 8px;
    color: rgba(205,214,244,0.2);
    text-transform: uppercase;
  }

  .muted { color: rgba(205,214,244,0.4); }
  .accent { color: #89dceb; }

  /* Базовый вертикальный дизайн */
  .pct {
    font-size: 36px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 6px;
  }

  .time, .power {
    text-align: center;
    font-size: 11px;
    margin-bottom: 2px;
  }

  .bar-container {
    margin: 12px 0 8px;
    height: 8px;
    position: relative;
  }

  /* ── Вариант 1: Сегменты ── */
  .v1-bar {
    display: flex;
    gap: 3px;
  }

  .v1-seg {
    flex: 1;
    height: 100%;
    border-radius: 2px;
    background: rgba(205,214,244,0.1);
  }

  .v1-seg.filled { background: #89dceb; }

  /* ── Вариант 2: Сплошной градиент ── */
  .v2-track {
    width: 100%;
    height: 100%;
    border-radius: 4px;
    background: rgba(205,214,244,0.1);
    overflow: hidden;
  }

  .v2-fill {
    height: 100%;
    width: 55%;
    background: linear-gradient(90deg, #6dd5ed 0%, #2193b0 100%);
    border-radius: 4px;
  }

  /* ── Вариант 3: Точки ── */
  .v3-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 100%;
  }

  .v3-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(205,214,244,0.1);
  }

  .v3-dot.filled { background: #89dceb; box-shadow: 0 0 4px rgba(137,220,235,0.4); }

  /* ── Вариант 4: Вертикальная ── */
  .v4-container {
    height: 60px;
    width: 8px;
    margin: 0 auto;
    background: rgba(205,214,244,0.1);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .v4-fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 55%;
    background: #89dceb;
    border-radius: 4px;
  }

  /* ── Вариант 5: Толстый прогресс ── */
  .v5-track {
    width: 100%;
    height: 12px;
    border-radius: 6px;
    background: rgba(205,214,244,0.08);
    overflow: hidden;
    border: 1px solid rgba(205,214,244,0.1);
  }

  .v5-fill {
    height: 100%;
    width: 55%;
    background: linear-gradient(135deg, #89dceb 0%, #6dd5ed 100%);
    border-radius: 6px;
  }

  /* ── Вариант 6: Квадратики ── */
  .v6-bar {
    display: flex;
    gap: 2px;
  }

  .v6-pixel {
    width: 8px;
    height: 8px;
    background: rgba(205,214,244,0.1);
  }

  .v6-pixel.filled { background: #89dceb; }

  /* ── Вариант 7: Волнистая ── */
  .v7-track {
    width: 100%;
    height: 8px;
    border-radius: 4px;
    background: rgba(205,214,244,0.1);
    overflow: hidden;
    position: relative;
  }

  .v7-fill {
    height: 100%;
    width: 55%;
    background: #89dceb;
    border-radius: 4px;
    clip-path: polygon(0 0, 90% 0, 100% 50%, 90% 100%, 0 100%);
  }

  /* ── Вариант 8: Зубчатая ── */
  .v8-track {
    width: 100%;
    height: 8px;
    background: rgba(205,214,244,0.1);
    border-radius: 2px;
    overflow: hidden;
  }

  .v8-fill {
    height: 100%;
    width: 55%;
    background: #89dceb;
    clip-path: polygon(0 0, 85% 0, 95% 50%, 85% 100%, 0 100%);
  }

  /* ── Вариант 9: Двойная ── */
  .v9-container {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .v9-bar {
    height: 3px;
    border-radius: 2px;
    background: rgba(205,214,244,0.1);
    overflow: hidden;
  }

  .v9-fill {
    height: 100%;
    width: 55%;
    background: #89dceb;
    border-radius: 2px;
  }

  .v9-fill.secondary {
    background: rgba(137,220,235,0.5);
    width: 45%;
  }

  /* ── Вариант 10: Глубина ── */
  .v10-track {
    width: 100%;
    height: 10px;
    border-radius: 5px;
    background: linear-gradient(180deg, rgba(205,214,244,0.05) 0%, rgba(205,214,244,0.15) 100%);
    border: 1px solid rgba(205,214,244,0.1);
    overflow: hidden;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
  }

  .v10-fill {
    height: 100%;
    width: 55%;
    background: linear-gradient(180deg, #89dceb 0%, #6dd5ed 50%, #2193b0 100%);
    border-radius: 5px;
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.1);
  }
</style>
</head>
<body>

<!-- ══ Вариант 1: Сегментированная ══ -->
