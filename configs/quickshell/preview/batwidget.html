<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Battery Arc</title>
<style>
  body {
    background: #13131d;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
  }

  .battery-container {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .ring {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    /* 50% заполнение: слева направо, начиная от 210deg */
    background: conic-gradient(
      from 0deg,
      rgba(205,214,244,0.1) 0deg,
      rgba(205,214,244,0.1) 150deg,
      transparent 150deg,
      transparent 210deg,
      #c6a0f6 210deg,
      #f5c2e7 285deg,
      #c6a0f6 360deg
    );
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .inner {
    width: 85px;
    height: 85px;
    border-radius: 50%;
    background: #13131d;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #cdd6f4;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 600;
  }

  .time-text {
    position: absolute;
    bottom: -2px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(205,214,244,0.6);
    text-align: center;
  }
</style>
</head>
<body>

<div class="battery-container">
  <div class="ring">
    <div class="inner">86%</div>
  </div>
  <div class="time-text">~1:39</div>
</div>

</body>
</html>
